name: secret-scan
on: [push, pull_request]
permissions:
  contents: read
jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks (free CLI; the gitleaks-action wrapper needs a paid org license)
        run: |
          VER=8.18.4
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" -o gl.tgz
          tar -xzf gl.tgz gitleaks
          ./gitleaks detect --source . --redact --no-banner
